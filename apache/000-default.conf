ServerName cyberphish.knf.vu.lt

# Take the real client IP from X-Forwarded-For, but only when the
# request arrives from the internal Caddy endpoint container
RemoteIPHeader X-Forwarded-For
RemoteIPInternalProxy 172.0.0.0/8

<VirtualHost *:8080>
	ServerAdmin admin@knf.vu.lt
	ServerName cyberphish.knf.vu.lt
	DocumentRoot /var/www/html/public/

	ErrorLog /var/www/logs/error.log
	LogFormat "%a %l %u %t \"%r\" %>s %b \"%{Referer}i\" \"%{User-Agent}i\"" proxy
	CustomLog /var/www/logs/access.log proxy
</VirtualHost>

<Directory /var/www/html >
	Options -Indexes +FollowSymLinks -MultiViews
	AllowOverride All
	Require all granted
</Directory>
<Directory /var/www/html/public/upload >
	php_admin_value engine Off
	RemoveHandler .php .phtml .phar .php3 .php4 .php5 .php7 .phps
	<FilesMatch "\.ph(p[3457s]?|t|tml|ar)$">
		Require all denied
	</FilesMatch>
</Directory>
